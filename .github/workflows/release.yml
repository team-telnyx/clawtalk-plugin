name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Lint
        run: npx biome check .

      - name: Test
        run: npx vitest run

      - name: Build
        run: npm run build

      - name: Pack tarball
        run: npm pack

      - name: Generate checksum
        run: |
          TGZ=$(ls clawtalk-*.tgz)
          shasum -a 256 "$TGZ" > "${TGZ}.sha256"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            clawtalk-*.tgz
            clawtalk-*.tgz.sha256
